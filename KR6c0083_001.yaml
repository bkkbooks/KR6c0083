body:
  text: 晉安後學釋寂𦦨述金剛般若波羅蜜經金剛天上之寶也帝釋有之薄福者難見具堅利明三義其體極堅一切物不能壞其用極利能壞一切物其相極明能照一切所以薩遮尼乾子經云帝釋金剛寶能滅阿修羅智碎煩惱山能壞亦如是故佛以喻三種般若梵語般若此云智慧其體即實相般若乃吾人本有之性真常清淨今古恆然雖經多劫流轉生死而曾無所損是極堅義其用即觀照般若亦是本有心光不發則已發則能斷惑著無始以來無明煩惱無所不壞是極利義約其功能稱波羅蜜此云到彼岸謂乘般若舟航離生死此岸度煩惱中流到涅槃彼岸涅槃此翻圓寂亦云滅度一切衆生即寂滅相不復更滅但以迷倒妄見生死名在此岸若悟生死本空元來圓寂名到彼岸若兼般若回文應云到彼岸慧上七字是所詮經字是能詮具貫攝常法四義貫者如線貫華謂貫串所應知義攝者如經持緯謂攝持所化衆生常者不易義乃三世諸佛不易之常道法者軌則義乃十方菩薩同遵之正軌即文字般若是極明義學者苟能由文字般若而起觀照由觀照般若而契實相是謂金剛智慧到彼岸也釋經正文準常三分曰序曰正曰流通蓋世尊將演般若先彰由致故曰序分由致既彰當機受法全經旨趣解行斯陳故曰正宗宗趣既明務於開濟近益當時遠益未來使傳芳千古慧命不絶故曰流通初序分有證信發起之殊今證信有六種成就如是我聞一時佛在舍衛國祇樹給孤獨園與大比丘衆千二百五十人俱如是信成就也信則所言之理順順則師資之道成佛法大海信為能入智為能度故居首也我聞聞成就也我者阿難自稱然是隨世假立不同凡夫外道所計之我聞者親聽非是展轉傳聞此方真教體清淨在音聞不假音聞教何由立一時者時成就也世事合會尚待昌期大法弘宣豈違嘉運故曰法王啓運嘉會之時也然十方世界天上人間時分不同今但取師資道合説聽究竟之時故云一時佛者主成就也梵語具云佛陀耶此云覺者具自覺覺他覺滿三義故稱為佛即本師釋迦牟尼佛為説法之主非大覺孰能演斯大法舍衛國等者處成就也舍衛梵語此云聞物以人物富庶聞於五天此説法之處在中天竺波斯匿王所都之國城外東南五里許乃祇陀太子之園大臣須達多此云善施以常給濟國之窮民人稱之為給孤獨長者布金買園太子捨樹共造精舍請佛説法可見般若大法非勝地亦不克宣也與大比丘衆等者衆成就也座無知音説將誰聽今機感盈前不得不説比丘含三義一乞士謂上乞法以資慧命下乞食以養色身亦云破惡亦云怖魔大者數多名重德隆也如憍陳那三迦葉舍利弗目犍連耶舍長者并其眷屬等俱在一時一處共相和合濟濟同聞可謂盛矣然此皆先事外道艱辛纍年一無所證才得見佛便登聖果感佛恩深故常隨侍所以偏列其數其餘天龍八部四衆人等皆結於流通分中首尾相望蓋影略耳爾時世尊食時著衣持鉢入舍衛大城乞食於其城中次第乞已還至本處飯食訖收衣鉢洗足已敷座而坐此發起序將説般若而以著衣持鉢為發起者顯般若不離日用之間也爾時者大衆雲集之時也食時者辰巳之間也我釋迦世尊既現相人中示同人法亦於食時著僧伽黎衣持紺琉璃鉢嚴整威儀肅恭齊法出祇園而入舍衛躬行三世諸佛乞食之法以內證平等理外空貧富相故於城中無問淨穢不揀貴賤次第而乞佛心既等使施者獲福亦等既得食已仍出大城而還至本處本處者事則祇桓精舍理則實相真空也佛凡所得食分為四分一與同梵行者二施貧病乞人三施水陸衆生四自食食訖乃收拾衣鉢而洗足焉阿含經説佛行時離地四指蓮華承足今洗足者先跣足行乞歸則洗濯塵汙垂範後人也敷座而坐者他經侍者敷座惟説般若佛自敷座以尊重般若故著衣持鉢表戒敷座而坐表定以戒定發起般若令人觀象會意也然此著衣持鉢洗足敷坐般若真機已漏泄無餘矣故空生不待如來開口便嘆希有大似靈山拈華迦葉微笑二人默識心通如出一律覽者詳焉上來序分竟二正宗分時長老須菩提在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言希有世尊如來善護念諸菩薩善付囑諸菩薩世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心此善現申請也洪鐘在非扣不鳴法施不吝待問乃説即此祇園一會皆有樂法之心未敢擅請時有德長年老號須菩提者此云空生亦名善現解空第一於如來著衣持鉢敷座而坐之次頓然發明般若心體遂知機知時即從法空之座而起悲智之用袒右肩屈右膝皆云右者表順也合掌表智與理冥也此上結集家敘其請法之儀下善現讚請先讚然如來日用妙處他人不知而空生獨知之乃讚言希有蓋曠劫難逢大千唯一豈多得哉善護念者以大慈護念根熟諸菩薩乃三賢已上者護念即加被與力也與根本智力令成就佛法與後得智力令教化衆生善付囑者以大悲付囑根未熟菩薩已得大乘者令其不捨未得大乘者令其勝進故慈氏頌云巧護義應知加彼身同行不退得未得是名善付囑後請者然圓頓因地總有三重初了悟本性次發菩提心後修菩薩行故華嚴善財先陳已發方問行門而此經全重在發菩提心以是修行根本故空生既悟此心遂請真修之行不但為己兼為一切衆生申請若人不發世間人天之心及出世聲聞緣覺之心而發於無上正等正覺之心極為難得即入如來護念付囑之中可不教以修行之法乎敢問昔未發心住六塵境今既發心應安住何地昔未發心隨逐妄念今既發心當妄念起時應云何降伏誠得如來開示使其知住知降則修行不錯不至於妄失菩提心矣此一問是一經關鍵按魏譯有三問應云何住云何修行云何降伏其心佛答令安住四心修六度行不令著相是降伏義秦譯略去修行者意謂住道降心即是修行不可離此別有所修也佛言善哉善哉須菩提如汝所説如來善護念諸菩薩善付囑諸菩薩汝今諦聽當為汝説善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心唯然世尊願樂欲聞重言善哉者讚其所問以善現讚請妙契佛心故印可云須菩提下二句牒其所讚汝今諦聽二句誡聽許説説箇什麼説發菩提心者如是安住如是降心之法即指下所答之文也又如是二字直捷指出若不如是而住則是非住若不如是降伏轉成妄心又安能得無上菩提哉時空生聞教即應之曰唯乃領略之辭如曾參聞一貫之道應之以唯者其心固已渙然無滯矣而復云願樂欲聞者蓋為衆而發起爾佛告須菩提諸菩薩摩訶薩應如是降伏其心所有一切衆生之類若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想非無想我皆令入無餘涅槃而滅度之如是滅度無量無數無邊衆生實無衆生得滅度者何以故須菩提若菩薩有我相人相衆生相壽者相則非菩薩此如來正答所問二一答安住降心問謂應住四心降伏其有我度生之心也問雖有二答乃互顯故先標降伏其心後結如所教住圭峰準魏譯三問舉降伏為總住修為別然詳經文無別答降伏之處則知降伏在住修中皆令離相是答降心之問是以舉降伏則攝安住矣前問云善男子善女人今答言菩薩者已發大心故受菩薩之稱菩薩此云覺有情謂以智上求覺道以悲下化有情也摩訶薩此云大道心衆生應如是降伏其心者即指下安住四心修行六度降伏其住相之心也發菩提心者以度生為急務凡所有一切衆生之類悉應度脫此總相説也若卵生等者以受生差別言之天獄化生鬼通胎化人畜各四諸餘微細水陸空行不可具分品類以依止差別言之有色四禪也以色蘊為身無色四空也以受想行識四蘊為身依止即身義以境界差別言之有想者無色界中空無邊識無邊二天也無想者無所有處天也非有想非無想者非想非非想處天也如是則包括三界無遺發菩提心者必應度盡而後已故彌勒頌云廣大第一常其心不顛倒利益深心住此乘功德滿度盡三界一切衆生則住廣大心也皆令入如來究竟無餘涅槃而滅度之此住第一心也滅度無量者牒前受生差別也無數者牒前依止差別也無邊者牒前境界差別也無衆生得滅度者謂若見有衆生可度即存度生之相必生於疲勞不能常度須知衆生性空故同體故即寂滅相不待更滅故無念故法界故故云實無衆生得滅度者論云平等真法界佛不度衆生此住常心也何以故者徵意云夫既度生矣乃曰無度者何耶謂若見有衆生可度則有我為能度若見有我則有人衆生壽者四相與顛倒凡夫何異反顯實無衆生得滅度則無我人衆生壽者四相是住不顛倒心也大珠和尚曰九類衆生一心具足隨造隨成是故無明為卵生煩惱包褁為胎生愛水浸潤為濕生倐起煩惱為化生悟即是佛迷號衆生菩薩只以念念心為衆生若了念念心體空名為度衆生也智者於自本際上度於未形未形既空即知實無衆生得滅度者復次須菩提菩薩於法應無所住行於布施所謂不住色布施不住聲香味觸法布施須菩提菩薩應如是布施不住於相何以故若菩薩不住相布施其福德不可思量須菩提於意云何東方虗空可思量不不也世尊須菩提南西北方四維上下虗空可思量不不也世尊須菩提菩薩無住相布施福德亦復如是不可思量須菩提菩薩但應如所教住二答修行降心問謂不住相修六度降伏其取相之心也所言不住相者非是滅相令無蓋相本自無心不住著華嚴經云凡夫見諸法但隨於相轉不了法無相以是不見佛然不著相即降心之法須約行以明之於法者總標諸法應無下正明修行然行具六度而獨云布施者以布施該攝六度所以彌勒頌云檀義攝於六資生無畏法於中一二三是名修行住此頌以三種布施該攝六度資生攝施無畏攝戒忍法攝進禪慧所謂一攝一二攝二三攝三是也所言不住者謂不住六塵乃至佛果菩提八十一科俱不可住著今但言六塵舉一以該之耳何以故者徵意云均一布施也住相何劣不住相何優釋曰有相之福小無相之福大若菩薩果能以般若真智照破幻相而行布施修六度其所得之福德殆超於常情之外不可得而思量者矣故舉十方虗空廣大無盡不可思量以喻之但應如所教住者結其所問謂但應如我所教無住相而修行於六度即是住處是住於無所住也於上答空生正問謂發菩提心者應住四心修六度行而降伏其有我之心則正宗已竟可入流通矣恐後來學般若者於如來答處不能無疑故躡前語迹假善現發起斷彼疑情展轉相生遂有二十七段故慈氏頌云調伏彼事中遠離取相心及斷種種疑亦防生成心是也初伏疑云本為求佛果行施即是住所求佛相云何無住又無相為因求三十二相佛果因果若是不相類乎此疑從前文不住相布施而來以聲聞人取丈六相好為佛不知無相法身真佛故對前不住相起疑之因問答欲令除斷須菩提於意云何可以身相見如來不不也世尊不可以身相得見如來何以故如來所説身相即非身相佛告須菩提凡所有相皆是虗妄若見諸相非相即見如來此斷求佛行施住相疑也空生既疑以無相為因求佛三十二相之果故反詰之曰於汝意中云何思惟為可以丈六身相而見法身如來不耶空生一承慈問便領佛意即答曰不也世尊伶利衲僧一撥便轉下皆倣此又自徵而釋之曰所以不可以身相見如來者以丈六身相特平等性智赴機所現之影如水中月似有非實豈是如來法身真體乎蓋法身無為不墮諸數故不可執相以求之也空生既知此旨佛遂印可而廣之曰非但佛身無相但是一切凡聖依正有為之相盡是虗妄以從妄念所變現故妄念本空所變何實若見諸相二句遮離色觀空也恐聞相是虗妄別求無相佛身故云相即非相若見非相即見法身如來何者蓋相本自盡真本自現故也洵乎發菩提心者不應住相而行施矣第二疑者空生聞上兩節無住行施因深也無相見佛果深也誠恐未來之世於此甚深道理難於生信則空説何益此節顯有疑辭與前後伏疑不同須菩提白佛言世尊頗有衆生得聞如是言説章句生實信不佛告須菩提莫作是説如來滅後後五百歲有持戒修福者於此章句能生信心以此為實當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根聞是章句乃至一念生淨信者須菩提如來悉知悉見是諸衆生得如是無量福德此斷因果俱深無信疑也文三初約無信呈疑空生聞上因果俱深謂是難信之法遂疑世無信者二呵疑顯信佛因呵止之曰汝莫作是無有實信之説豈但如來在日即使如來滅後後五百歲當鬬諍堅固之時去聖愈遙人根愈劣亦有修戒定而於此因果俱深之章句能生實信之心者三明能信所以又二初明歷事多佛以顯信因謂此非聊爾人此人豈止於一二佛所而種善根乃是於無量千萬佛所發菩提心種植無貪等諸善根者夫一念生淨信者其善根廣大深固已如此況永信不退者乎二明諸佛攝受成就信德亦二初明諸佛攝受顯福德門呼須菩提告之曰如來悉以現量而知佛眼而見是諸淨信衆生於行住所作中得如是無量之福德如是二字即指上廣大無盡善根何以故是諸衆生無復我相人相衆生相壽者相無法相亦無非法相何以故是諸衆生若心取相則為著我人衆生壽者若取法相即著我人衆生壽者何以故若取非法相則著我人衆生壽者二明攝受所以顯智慧門初總徵云夫一念淨信無幾矣以何義故得諸佛悉知悉見耶釋意云無淨信人固執五蘊身心內作主宰名為我相以計我故起惑造業展轉趣於餘趣曰補特迦羅此云數取趣名為人相計我盛衰苦樂變異相續而生名衆生相計一報命根識暖息三事相連不斷而住名壽者相此四總一我相也今淨信者不於五蘊身心執著四相則我空矣亦不於五蘊身心起法執分別則法空矣又不住法空故云亦無非法相以真空不斷非法亦無如是離二執成就淨信蒙諸佛知見攝受為得福之本也次何以故下重釋上三義初徵云何以知淨信者斷我法二執耶釋意謂夫淨信者若有我執而心取諸相則著我等四相既不取相則知無我執矣若有法執而心取法相亦著我等四相蓋法根也我苗也有根必有苗有法執必有我執既無我等則知無法執矣後又徵云法執但是法相何故便著我等釋意謂取非法亦著我等何況取法以後釋前也是知纖毫取著便落法塵具我等四相故淨信者尤當法與非法俱盡也是故不應取法不應取非法以是義故如來常説汝等比丘知我説法如筏喻者法尚應捨何況非法是故者由前取法非法皆為著我之故所以誡令不應即入中道也謂不應取法而著有亦不應取非法而著空以此不著義故如來常説汝等比丘須知我所説之法皆是假言顯義學者須得義而忘言如渡河捨筏之喻筏者過河之具到岸則捨如來説非法乃渡法之筏耳法尚應捨何況非法而不捨哉河已渡而猶戀於筏與未渡河者何異法既捨而猶住於非法與未捨法者無以異也不住法不墮於有不住非法不墮於空入中道之玄門乃能與無住之因無相之果相應是謂稱實淨信者矣第三疑云上説不可以相見佛佛非有為即不合有所得有所説何以如來得菩提而説法耶須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所説法耶須菩提言世尊如我解佛所説義無有定法名阿耨多羅三藐三菩提亦無有定法如來可説何以故如來所説法皆不可取不可説非法非非法所以者何一切賢聖皆以無為法而有差別此斷無相云何得説疑也有二段先問答斷疑次較量顯勝今初斷疑佛問於汝意中將謂如來於菩提樹下得菩提耶又將謂如來於前後諸會有所説法耶空生即領其意答云世人皆謂如來有所得有所説如來解佛所説義則不然蓋必有法名菩提而後得今無定實之法將何所得耶可見菩提樹下乃是隨機化現非法身真佛也必有定法而後可説今無定實之法將何所説耶可見前後諸會皆隨機方便無實法也此一向約勝義邊答所以慈氏偈云應化非真佛亦非説法者説法不二取無説離言相意謂俗有真無應化之相依俗乃有答中依真故言無有定法所以云始從得道夜終至般泥洹於是二中間未嘗説一字何以故者徵意云何以無定法可説耶釋意謂如來所説之法無非第一義諦離心緣相故不可取離言説相故不可説無法相故云非法無非法相故云非非法所謂夫説法者無説無示其聽法者無聞無得是也後所以者何徵意謂夫無得無説是無為法無為法者法身之理本無名相不涉言思何有三乘賢聖差別哉釋意云三乘賢聖差別皆於無為無差別法中而有差別如三獸渡河之喻河無淺深而淺深在獸無為法無差別而差別在三乘能證之智有大小淺深之不同耳二較量顯勝上明無為之法不涉取説恐人便欲一向毀廢言教豈知法雖不可取説亦可藉言而入而受持者福德不空故較量顯勝令人受持演説以趣菩提須菩提於意云何若人滿三千大千世界七寶以用布施是人所得福德寧為多不須菩提言甚多世尊何以故是福德即非福德性是故如來説福德多若復有人於此經中受持乃至四句偈等為他人説其福勝彼何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出須菩提所謂佛法者即非佛法佛先舉世福問之謂若有人盛滿大千世界七寶為施得福多不三千大千者俱舍偈云四大洲日月蘇迷盧欲天梵世各一千名一小千界此小千千倍説名一中千此千倍大千皆同一成壞空生意謂七寶最珍三千世界又最廣七錢施佛獲福無量況多寶乎故云甚多又自徵云所以云多者以不約勝義諦而論其福德之性乃約世俗諦説耳然既約俗諦説特世間福不如持經出世之福為勝故佛言若復有人於此經中如前所説無我度生也不住相行施也佛不可以相見也法不可以言説也一念淨信志心領受拳拳奉持或全持或分持乃至四句偈等且兼為他人演説其義趣其所得福更勝於彼夫持經四句何以輒勝大千寶施之福意謂寶施雖多但是世間有為之福終不能趣無上菩提若夫此經四句偈等則一切諸佛之報身化身及諸佛無上菩提之法身無不從是而生何者法身雖不生滅而煩惱覆之則隱智慧了之則顯此經單闡妙慧於法身不為了因乎報化二身萬行所致此經以妙慧導妙行於報化不為生因乎其功如是故獨勝於大千寶施之福也然所謂佛法從此經出者約世諦有耳若於第一義諦求於迷悟聖凡之相了不可得即非所謂佛法從此經出也所以圓覺經云一切如來圓覺妙心本無菩提及與涅槃亦無成佛及不成佛始之以不得菩提終之以即非佛法前後照應而經旨愈明矣第四疑云聖人無為之法既不可取説何以聲聞人各取自果如其所證而説耶四果分四節須菩提於意云何須陀洹能作是念我得須陀洹果不須菩提言不也世尊何以故須陀洹名為入流而無所入不入色聲香味觸法是名須陀洹此斷聲聞得果是取疑也先舉初果問之須陀洹此云入流已斷三界貪嗔癡慢等八十八使見惑預入聖人之流也謂彼作是念曰我得須陀洹果不空生答言彼不作是念也何以故彼須陀洹已斷三界分別粗惑名為入聖流而實別無一法為其所入秪由不取色香味觸六塵境界名為須陀洹也豈別有法為所入耶是正以不取為得果何疑其有取耶苟猶有分別我能得果之心即為著我之凡夫何名入聖流之初果須菩提於意云何斯陀含能作是念我得斯陀含果不須菩提言不也世尊何以故斯陀含名一往來而實無往來是名斯陀含次舉二果問之斯陀含此云一來已斷欲界九品思惑前六品更三品殘思未盡須一往來欲界受生也謂彼作是念曰我得斯陀含果不空生答言彼不作是念也何以故彼斯陀含名一往來而實無往來蓋已悟我空是誰往來使其猶見有往來之者是我相未除安得名為二果一往來耶以此觀之斯陀含於自果亦不取矣須菩提於意云何阿那含能作是念我得阿那含果不須菩提言不也世尊何以故阿那含名為不來而實無不來是故名阿那含又舉三果問之阿那含此云不來蓋欲界九品思惑已盡不復還來欲界受生也謂彼作是念曰我得阿那含果不空生答言彼不作是念也何以故阿那含於欲界九品習氣俱時滅盡下無卜居名為不來而實無不來蓋已悟無我是誰不來使其猶見有不來之者則我相猶在安得名為不來耶以此觀之阿那含於自果亦不取矣須菩提於意云何阿羅漢能作是念我得阿羅漢道不須菩提言不也世尊何以故實無有法名阿羅漢世尊若阿羅漢作是念我得阿羅漢道即為著我人衆生壽者世尊佛説我得無諍三昧人中最為第一是第一離欲阿羅漢我不作是念我是離欲阿羅漢世尊我若作是念我得阿羅漢道世尊則不説須菩提是樂阿蘭那行者以須菩提實無所行而名須菩提是樂阿蘭那行後舉四果問之阿羅漢此云無生以三界煩惱已盡不受後有也謂彼作是念曰我得阿羅漢道不耶空生答言彼不作是念也何以故阿羅漢者秪是三界見思淨盡證我空真如實無有法可得名阿羅漢若使意下作是念言我得阿羅漢道即為著我等四相與凡夫無異安得名為阿羅漢耶又引己況之曰佛昔曾説須菩提得無諍三昧無諍三昧者以無我故不惱於人若嫌坐則立不較人我是非令人不起煩惱此行最高故云人中最為第一羅什云無諍有二一以三昧力將護衆生令不起諍心二隨順法性無違無諍也一切羅漢皆離三界貪欲煩惱名離欲阿羅漢我以無諍故於諸離欲羅漢之中稱為第一也雖蒙佛如是印許而我不作是念曰我是離欲阿羅漢若作是念是有我也諸諍皆起於有我世尊則不説須菩提是樂阿蘭那行之者阿蘭那此云寂靜即無諍也諍則喧閙謂非樂修寂靜行之人也以須菩提實無所行之故而名須菩提曰是樂阿蘭那行者須菩提既爾則諸聲聞得果無取何疑耶第五疑云釋迦因中為善慧仙人蒙然燈如來授記然燈為釋迦説法云何言不可取説耶佛告須菩提於意云何如來昔在然燈佛所於法有所得不不也世尊如來在然燈佛所於法實無所得此斷釋迦然燈取説疑也恐疑有所得故乃審問空生曰如來昔在然燈佛所授記時於法有所得不空生直答曰無所得何也授記者但是語言非是證智然則何以得記耶得記者但以自無分別智證自無差別理智與理冥境與神會而已豈有所説所得耶第六疑云若法不可取諸菩薩修六度行莊嚴淨土豈不是取於所莊嚴之佛土耶此而非取則孰為取耶須菩提於意云何菩薩莊嚴佛土不不也世尊何以故莊嚴佛土者即非莊嚴是名莊嚴是故須菩提諸菩薩摩訶薩應如是生清淨心不應住色生心不應住聲香味觸法生心應無所住而生其心此斷嚴土違於不取疑也佛土有二一法性土二形相土佛意欲顯法性真土故問取形相莊嚴土不空生乃以不取形相莊嚴答之何也蓋莊嚴佛土者唯修習無分別智通達於唯識真實之性以智契如名為莊嚴非形相莊嚴故云即非莊嚴是第一義莊嚴故云是名莊嚴形相即法相土謂金地寶池等第一義即法性土乃真如不變之性然諸佛身土必須性相具足方為了義今既唯言於性豈不闕於相耶蓋身土之相唯心之影即相亡相非謂棄相取性但以經宗無相此義稍增耳若人分別佛土是有為形相而言我成就者彼住於色等境中為遮此故云應如是生清淨心不應住色等也而生其心者此是真心若都無心便同空見真心而云生者所謂顯發非創然而生故大般若經云一切法不生是般若波羅蜜生以有住之心悉是妄識分別一切無住真心即顯契於般若心體也故嵩嶽安國師云應無所住者乃不住善不住惡不住迷不住悟不住體不住用而生其心者即一切法而顯其一心若住善生心即善現住惡生心則惡現本心即隱沒若無所住則十方世界唯是一心若能如是了悟是真莊嚴何有佛土而不清淨耶第七疑云無為法中應化非真故無有取報身是實應有取心此躡彼第三而來也須菩提譬如有人身如須彌山王於意云何是身為大不須菩提言甚大世尊何以故佛説非身是名大身此斷受得報身有取疑也佛知後世學般若者有此疑故設喻為問文二一問答斷疑此以須彌明報身也須彌山王勢力高遠故名為大而不取我是山王以無分別故報佛亦如是以得無上法王體故名為大而不取我是法王以無分別故善現乃就法而答曰甚大復自徵釋其大之所以曰以非有漏有為之身乃是無漏無為之法身故名大身也慈氏偈云如山王無取受報亦復然遠離於諸漏及有為法故問此説報身云何言法答茲法報合説二身不殊以實教理智無二故得云耳至此理極情亡信此法者福德難量是以下文如來舉福較勝須菩提如恆河中所有沙數如是沙等恆河於意云何是諸恆河沙寧為多不須菩提言甚多世尊但諸恆河尚多無數何況其沙須菩提我今實言告汝若有善男子善女人以七寶滿爾所恆河沙數三千大千世界以用布施得福多不須菩提言甚多世尊佛告須菩提若善男子善女人於此經中乃至受持四句偈等為他人説而此福德勝前福德二較量顯勝又二一約外財較量廣顯經勝二約內財較量倍顯經勝今初呼空生審定其數初約多河以辨沙如來説法多近恆河故舉為喻恆河周四十里沙細如麵不可以數計今以一沙為一河有如是無數沙等之恆河河各有沙是諸沙等恆河之沙寧為多不空生答言甚多何者但舉沙數之河尚多無量何況多河中所有之沙可盡算數乎次約多沙以彰福曰我今實言告汝設若有人於外財無所吝惜以七寶之最珍者布滿爾所恆河之沙數一沙為一大千世界以之布施其所得之福寧為多不空生意謂前一大千寶施已為無量況此沙界寶施寧有量乎後約多福以顯經勝謂寶施之福雖多若人於此經中受持四句偈等自行之餘為他人説其所得福更勝於前沙界寶施之福德以施福有漏猶屬生死經趣菩提顧可同日而語哉次釋勝之所以有五節復次須菩提隨説是經乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟何況有人盡能受持讀誦須菩提當知是人成就最上第一希有之法若是經典所在之處即為有佛若尊重弟子一尊處歎人勝謂豈唯是説經之人難得當知此説經之處亦甚希有宜為一切世間若天若人恭敬供養猶如佛之塔廟然藏佛舍利之處謂之塔奉佛形像之處謂之廟人覲塔廟不期敬而自敬如天帝釋常於善法堂中為諸天説般若向後諸天到善法堂帝釋未至皆尚空座作禮為重法故乃尊其處也夫説四句之處尚爾何況有人於此全經盡能受持讀誦當知是持説之人成就最上第一希有之法也最上者法身也無漏無為最上上故第一者報身也衆聖中尊更無過故希有者化身也曠世奇逢難遭遇故意明受持讀誦具獲三身功德也又顯在處有佛謂經是如來法身依法則有報化又一切賢聖皆以無為得名經顯無為必有賢聖尊重弟子而輔化矣爾時須菩提白佛言世尊當何名此經我等云何奉持佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持所以者何須菩提佛説般若波羅蜜即非般若波羅蜜是名般若波羅蜜二約義辨名勝空生疑念氷釋又聞經功德之勝遂希慕奉持而請經名焉所以名者金剛有能壞之義般若有觀照之功名實相稱法喻雙彰故云金剛般若世尊又自徵釋曰佛雖説般若勝義諦中本無名字可得故云即非般若為受持故於無名中而強立之故云是名般若須菩提於意云何如來有所説法不須菩提白佛言世尊如來無所説三佛無異説勝此躡前云非唯立此經名名即非名凡有所説皆悉如此故云如來無所説謂無別異增減之説但如所證第一義諦而説説即無説也須菩提於意云何三千大千世界所有微塵是為多不須菩提言甚多世尊須菩提諸微塵如來説非微塵是名微塵如來説世界非世界是名世界四施福劣塵勝此節乃是躡前施寶得福而來謂前寶施得福雖多然不能離相則是貪等煩惱染因有為福報爾故此遂以微塵世界為喻塵界乃無情之物由不生貪等煩惱不為染因故能勝寶施況持説此經是遠離煩惱因能趣菩提而不勝耶非微塵非世界者非貪等煩惱塵非煩惱染因界也是名微塵世界者是無記地塵世界也無記猶無情謂不起善惡也意云碎界為塵塵不起煩惱寶施得福苟無般若力來世必感大福報起貪嗔癡五欲自娛無惡不造故云布施是第三生怨所以塵界勝於寶施且塵界無記不起煩惱尚得為勝況受持此經定招佛果其功德殊勝何可量乎由是相望便有三重勝劣謂寶施不及塵界塵界不及持經是以持經尚勝於塵界豈得不如寶施乎須菩提於意云何可以三十二相見如來不不也世尊不可以三十二相得見如來何以故如來説三十二相即是非相是名三十二相五感果離相勝恐施寶者云我施求佛誰言煩惱然彼所求者乃是色相佛為破此執故審問空生云可以三十二相見如來否空生答以不可何以故者徵意云既得三十二相何以不可釋意云三十二相非是法身無為之相故云即是非相以是施福色相佛身故云是名三十二相須菩提若有善男子善女人以恆河沙等身命布施若復有人於此經中乃至受持四句偈等為他人説其福甚多二約內財較量倍顯經勝也意恐人聞寶施不及持經便謂以是身外之財所以劣於經福若將身命布施必勝受持為破其見故有此文身布施者或施眼為妙藥或捨頭為飲器或為執作或為床座等命布施者割肉代鴿捨身飼虎等不唯一身命布施乃以恆沙身命如是布施則其福豈不超於持經耶殊不知無般若力事屬有為功歸有漏只成苦果四句偈等為他人説發明妙慧為成佛真因用之較量霄壤懸殊以此觀之捨身勝於寶施持説又勝捨命甚矣經之功德不可思議四句猶然況全經乎所以空生領旨涕淚悲泣良有以也下釋勝之所以有五節爾時須菩提聞説是經深解義趣涕淚悲泣而白佛言希有世尊佛説如是甚深經典我從昔來所得慧眼未曾得聞如是之經一泣歎未聞深法勝空生理解已廓述其所悟感激未聞謂捨身之苦已感人心何況更聞不及持説之勝得聞此法感佛恩深喜極成悲是故涕泣慧眼者謂我從昔以來所得者僅人空慧眼而已未曾得聞如是法空深理之經今深解其義趣故含悲感嘆也世尊若復有人得聞是經信心清淨即生實相當知是人成就第一希有功德世尊是實相者即是非相是故如來説名實相二淨心契理具德勝謂若人聞此經能生真信之心此信若生不信諸法故云清淨諸法既泯實相生焉生字即應無所住而生其心之生乃顯發之義也實相既生當知是人必成就第一希有功德以超越凡小無與等者故云第一曠劫難聞故云希有也實相非相者良以實相無相言念不及雖假言念唯證相應起念承當但認影像即非真信故拂之也説名實相者不壞假名隨俗而説耳世尊我今得聞如是經典信解受持不足為難若當來世後五百歲其有衆生得聞是經信解受持是人即為第一希有何以故此人無我相人相衆生相壽者相所以者何我相即是非相人相衆生相壽者相即是非相何以故離一切諸相即名諸佛佛告須菩提如是如是三信解三空同佛勝意云我登聖果親稟佛言得聞是經信解受持不足為難若當來後五百歲去聖時遙目不覩玉毫之彩耳不聞金口之音其有衆生得聞是法空深理之經覽遺教而興思觸微言而啓悟信無相法解實相理受而不忘持而不失依解起行不亦難乎是人則為第一希有者矣又徵云何以希有耶夫難莫難於破二執證二空此人當其信解之時已無我等四相而我空矣我等四相即是非相即法空矣何以故爾離一切諸相即名諸佛以執謝情亡覺體顯露而頓了諸佛法身則此豈不為希有者乎以上皆空生語也唯其領悟之深故言之切悲淚涕泣誠出肺腑豈比世人之浮慕者乎佛深嘉其言之當意之切故重言以印之曰如是如是若復有人得聞是經不驚不怖不畏當知是人甚為希有四聞時不動希有勝驚謂愕然而怪怖則進退慞惶畏則一向恐懼世尊於人天小乘教中説空説有不達意者隨言而執及説此非空非有中道之理先所執者聞之未免驚畏却以為非今謂聞此深法不生驚畏直趣大道者實為希有也何以故須菩提如來説第一波羅蜜即非第一波羅蜜是名第一波羅蜜五大因清淨第一勝徵意云以何義故聞而不驚為希有耶謂六度前五若無般若不能到彼岸以有般若度度皆到故般若為第一若約勝義則無可言故云即非第一約世諦故云是名第一大因清淨亦以此得名也第八疑云向説捨身秪感有漏苦果故福劣且受持演説修菩薩行不憚勤勞如昔薩陀波崙賣心肝求般若及一句投火半偈亡軀之髏亦是苦行云何不感苦果乎如來曉以持經達我法二空誰受苦果安可與滯相者同日而語哉須菩提忍辱波羅蜜如來説非忍辱波羅蜜何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無衆生相無壽者相何以故我於往昔節節支解時若有我相人相衆生相壽者相應生嗔恨須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無衆生相無壽者相此斷持説未脫苦果疑也二初明超忍以斷疑又二初明忍體六波羅蜜中忍是苦相忍到彼岸苦相已離況彼岸非岸誰苦誰忍以勝義諦中能所兩寂無辱無受辱者安有忍乎以此觀之學般若菩薩不獨忘辱抑且忘忍矣次明忍相有二一引一生證極苦忍如是苦行佛昔曾行故引歌利之事以證之謂世尊往劫作仙人山中修道被歌利王割截身體歌利此云極惡同妃出獵疲倦而寢妃往禮仙王起嗔恚尋至仙處問仙曰得四果不皆云不得王言汝既年少又未得果具有貪欲煩惱云何恣意觀我女人仙言我雖未斷欲結然其內心實無貪著由繫念無常不淨故王怒割截天怒雨石王懼懺悔仙誓無嗔四體平復王乃免害佛云我於爾時無我人等四相又反顯曰當支解時若有我等四相應生嗔恨然我於爾時無嗔是知無我也二引多生證相續忍謂不獨一生五百世中作忍辱仙人無我等四相不惟無苦而且有樂以與正定慈悲相應故是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心不應住色生心不應住聲香味觸法生心應生無所住心若心有住則為非住是故佛説菩薩心不應住色布施須菩提菩薩為利益一切衆生故應如是布施如來説一切諸相即是非相又説一切衆生即非衆生二勸離相以安忍論云若有菩薩不離我相見苦行苦亦欲捨菩提心故勸離相無著云為對治不忍因緣有三種苦謂流轉苦衆生相違苦乏受用苦有二初總標離相發心離一切相者為離如是三苦相也二不應下別顯亦有二一對治不忍流轉苦流是集諦轉是苦諦即世間所繫六塵之境故云不應住色等生心應生於無住菩提之心若使心有所住著則於世間流轉苦中疲乏菩提心不生即非住於菩提心矣是故佛於正答所問行施降心中説菩薩心不應住色布施是引前以證也二菩薩為利益下對治不忍相違苦菩薩為利羣生故應如是離相行施衆生相違不生疲乏云何生嗔隨於境緣而轉耶故下遣著顯示人法二無我一切諸相是法境即是非相顯法空又説一切衆生是人境即非衆生顯人空人法既空何處見有衆生乃因其相違而生疲乏耶人法之相本空衆生不了妄執為有是故勸離離則內不見有人外不見有法則誰忍誰違乎第九因上較量內外財施不及持經而得菩提遂疑云若然者且言説是因因即是道以此證果理則不成何者以果是無為無為有體因乃有為有為無體無體之道不到果中云何説此而為因耶須菩提如來是真語者實語者如語者不誑語者不異語者須菩提如來所得法此法無實無虗此斷能證無體非因疑也意云如來之言真實無異皆如其事不誑衆生持説得菩提何以疑而不信菩提雖不在持説而持説能為菩提之因苟隨言生執聞依持説得菩提便謂言中有菩提及聞言中無菩提便謂畢竟無菩提不達言空法實故作斯執今則遣之曰汝豈知如來所得之法本無實無虗者乎何者言説緣生性本空寂非實也菩提體實雖不在言説不離言説之中非虗也若然者則不應言中執有離言執無達此無實無虗之法則永離諸執矣第十疑從第三中來彼但云無為此云真如揀餘無為以顯遍義餘無為有不遍故謂此遍一切時一切處處則及乎塵塵時則該乎念念若然即合皆得何故有不得者釋意云若住法行施則不得真如如人入暗中一無所見若無住行施則得真如如太陽升天何所不曯得失在人非關真如也須菩提若菩薩心住於法而行布施如人入暗即無所見若菩薩心不住法而行布施如人有目日光明照見種種色此斷如遍有得無得疑也有二初舉喻斷疑二讚經功德今初謂真如雖遍得失在人譬如虗空無所不遍遍衆生遍國土遍一切時而性中無量功德如虗空中種種色無所乏少若菩薩無般若觀照之智心住於法執著色等六塵而行布施如是則心不清淨為塵所染正智不顯不證真性如人入暗冥之中雖對物而不見物雖在空何曾見空若菩薩有般若觀照之智其心不住著於六塵等法而行布施如是則心清淨不為塵染智慧明發真性廓周自然明見如人眼目清明天色晴霽日光普照虗空中所有種種之色無所不見不但明時空無邊際即迷暗之時身在其中未曾暫離是知迷悟在人非真如有遍不遍也須菩提當來之世若有善男子善女人能於此經受持讀誦則為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德二讚經功德此經似乎一周將終故重讚之先總讚論云為欲受故讀為欲持故誦又受持修行依總持法故讀誦修行依聞慧廣故是則從他聞法內自思惟得修行智而三慧具矣其所得無量無邊功德除佛世尊無能知見者矣須菩提若有善男子善女人初日分以恆河沙等身布施中日分復以恆河沙等身布施後日分亦以恆河沙等身布施如是無量百千萬億劫以身布施若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解説二別顯反覆讚揚別有十段一捨命不如前者一河沙身命布施不及持經之福今一日三時以恆河沙等身布施至於無量億劫日日皆然尚不及信心不逆之福況從而書寫受持讀誦為人解説者乎其功德利益不可思議者矣須菩提以要言之是經有不可思議不可稱量無邊功德二餘乘莫測以非餘者境界故不可思議者自覺聖智之境唯證相應故不可稱量者無有等及勝故如來為發大乘者説為發最上乘者説三為大機説大乘猶濫權教最上乘乃佛乘也若有人能受持讀誦廣為人説如來悉知是人悉見是人皆得成就不可量不可稱無有邊不可思議功德如是人等則為荷擔如來阿耨多羅三藐三菩提四具德能傳謂唯能荷擔菩提令佛種不斷者能成就如上不可思議功德餘不能也何以故須菩提若樂小法者著我見人見衆生見壽者見則於此經不能聽受讀誦為人解説五樂小不堪四諦緣生名為小法聲聞緣覺是樂小之人彼有法執此顯三空非其境界故不能持説也須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處則為是塔皆應恭敬作禮圍繞以諸華香而散其處六所在如塔謂般若所在即是法身如塔廟然常有八部恭敬散華供養不可輕褻也復次須菩提善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業則為消滅當得阿耨多羅三藐三菩提七轉罪成佛持經者宜為人所尊敬必無輕賤之事若為輕賤以是人先世或未持經之先作罪惡之業來世應墮惡道受報由今持經功德遂轉重報令輕受轉生報後報令現受止以今世為人所輕賤之故彼先世所有罪業即為消滅不唯滅罪且以熏修般若之故當來必得菩提蓋持經無我即煩惱障盡罪業消滅即業障盡不墮即報障盡三障既盡三德必圓今雖未得當來必得也輕賤者一切毀辱總包其中須菩提我念過去無量阿僧祗劫於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及八超事多佛十億為洛叉十洛叉為俱胝十俱胝為那由他意明持説此經速證菩提之法所以超過如來事多尊之福須菩提若善男子善女人於後末世有受持讀誦此經所得功德我若具説者或有人聞心則狂亂狐疑不信九具聞則疑謂此經功德雖多次較量未敢具足而説若具足説者本欲令人生信其如非其境界聞之心則狂惑瞀亂反致狐疑不信謂世間那有此事按前十疑邐迤次第五番較量謂外財兩度內財兩度佛因一度且第一一大千界寶施第二無量大千界寶施第三一恆沙身命第四無量恆沙身命三時布施至無量劫是較量之極更無譬喻可以比況後所較量但是別意隨時略舉一大千界寶或須彌聚寶或阿僧祗寶非同前説五重次第也須菩提當知是經義不可思議果報亦不可思議十總結幽邃至此讚較都絶望前數段故總結云是經義不可思議則持經果報亦不可思議矣第十一疑以上來一周已竟又疑云住修降伏已徹三空既無有我然住修降伏及斷上十種疑執者畢竟是誰乎故重請問以斷微細執情所謂了了了時無可了玄玄玄處更須呵是也問答不異前而所明之理所斷之惑逈異于前也讀者詳之爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心佛告須菩提若善男子善女人發阿耨多羅三藐三菩提心者當生如是心我應滅度一切衆生滅度一切衆生已而無有一衆生實滅度者何以故若菩薩有我相人相衆生相壽者相即非菩薩所以者何須菩提實無有法發阿耨多羅三藐三菩提心者此斷住修降伏是我疑也空生承上正答及斷十種疑如來所以開示無我者至矣苟無有我是誰發心住修降伏故重請問住修降伏之義以斷前住修降伏是我之疑也如來所答亦不異前謂發菩提心者當生如是心我應滅度一切衆生實無衆生得滅度者是無所度之境若謂我能度衆生則有我人四相即非菩薩是無能度之心故慈氏頌云若內心修行存我為菩薩此即障於心違於不住道次徵云所以必外無生內無我者何也以實無有法名發菩提心者法字能所俱攝謂能所俱寂方是發無上菩提心者此宛轉搜剔有我之疑也第十二疑云若無菩薩云何釋迦因地於然燈佛所行菩薩行耶須菩提於意云何如來於燃燈佛所有法得阿耨多羅三藐三菩提不不也世尊如我解佛所説義佛於燃燈佛所無有法得阿耨多羅三藐三菩提佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提須菩提若有法如來得阿耨多羅三藐三菩提者燃燈佛則不與我授記汝於來世當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故燃燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼此斷佛因是有菩薩疑也昔降怨王請佛入城城中長幼盡迎路泥善慧布髮佛與授記故舉此問空生答無有法得菩提者以善慧彼時都無所得離諸分別由無法故得記若有法者是有心相不順菩提佛不與記佛遂印可曰如是如是實無有法如來於燃燈佛所得菩提者又呼空生反覆釋之曰若有法得菩提燃燈佛則不與我授記曰汝於來世當得作佛號釋迦牟尼釋迦翻能仁牟尼翻寂默以寂默冥理不住生死能仁利物不住涅槃以實無有一法得菩提是故燃燈佛於人天衆前與我授記曰善慧汝於來世當得作佛號釋迦牟尼授記之時智與理冥境與神會何有一法可得耶第十三疑云果法號曰菩提證得始名為佛既菩提不可得豈有能證如來耶何以故如來者即諸法如義若有人言如來得阿耨多羅三藐三菩提須菩提實無有法佛得阿耨多羅三藐三菩提須菩提如來所得阿耨多羅三藐三菩提於是中無實無虗是故如來説一切法皆是佛法須菩提所言一切法者即非一切法是故名一切法須菩提譬如人身長大須菩提言世尊如來説人身長大即非大身是名大身此斷無因則無佛法疑也即躡上章而來徵意云若無菩提則無有佛何以得有如來耶釋中先斷無佛疑若言無佛於四句中墮損減謗是真謗佛夫如來者非他即諸法如義如者真如通於凡聖但以衆生垢染故名如去佛位清淨故名如來若無真如則無有佛今真如本有復何疑乎此顯真如是佛故非無也次斷無法疑佛與菩提義分人法體無二源由是唐言總名為覺始疑無佛乃以如義釋之次疑無法謂菩提有得是有執菩提無得是無執如來雙遣之曰如來所得菩提於是中無實以菩提無彼色聲等相故亦無虗以無色聲等相處即無相是菩提相故既無實之可指亦無虗之可言一如而已是故如來説一切凡聖依正之法並以真如為體皆是佛法又言一切法即非一切法者以即是真如非色等法故是故名一切法者是真如法自性故如來又顯真佛真法之體曰譬如人身長大者謂真如法身也即非大身者離諸相也是名大身者有真如體也第十四疑云若無菩薩者諸佛不成菩提衆生不入涅槃亦無清淨佛土何故諸菩薩發心欲令衆生入涅槃起心修行清淨佛土耶須菩提菩薩亦如是若作是言我當滅度無量衆生則不名菩薩何以故須菩提實無有法名為菩薩是故佛説一切法無我無人無衆生無壽者須菩提若菩薩作是念我當莊嚴佛土是不名菩薩何以故如來説莊嚴佛土者即非莊嚴是名莊嚴須菩提若菩薩通達無我法者如來説名真是菩薩此斷無人度生嚴土疑也此疑亦從第十二佛因中來起則同時斷須次第先斷度生疑謂若言我當滅度無量衆生則不名菩薩何以不名菩薩以實無法名菩薩豈有我度衆生耶是故佛常宣説一切諸法本無我人等相但違之則是衆生順之則是菩薩次斷嚴土疑準上可知偈云不達真法界起度衆生意及清淨國土生心即是倒問此與第六皆言嚴土義何別耶答前對無取疑有取此對無人疑有人佛意但是拂於我人之心非是泯於菩薩所以空生起疑之處云無菩薩如來斷疑之處則言無人彼此媕含未嘗顯説直至此處方乃決通特言通達無我法者如來説名真是菩薩謂人無我法無我也第十五疑云若菩薩不見彼是衆生我為菩薩不見所嚴淨之佛土若爾則諸佛不見諸法都無智眼耶須菩提於意云何如來有肉眼不如是世尊如來有肉眼須菩提於意云何如來有天眼不如是世尊如來有天眼須菩提於意云何如來有慧眼不如是世尊如來有慧眼須菩提於意云何如來有法眼不如是世尊如來有法眼須菩提於意云何如來有佛眼不如是世尊如來有佛眼此斷諸佛不見諸法疑也文二一約能見五眼以明見淨諸佛雖不見諸法非無了境之智蓋諸佛知見淨勝具於五眼淨用肉眼見障內色佛具諸根豈無肉眼天眼者於肉眼邊引淨天眼見障外色淨名云唯佛世尊得真天眼慧眼以根本智照真理法眼以後得智説法度生佛眼者前四在佛總名佛眼又見佛性圓極名為佛眼古德偈云天眼通非礙肉眼礙非通法眼唯觀俗慧眼了知空佛眼如千日照異體還同須菩提於意云何如恆河中所有沙佛説是沙不如是世尊如來説是沙須菩提於意云何如一恆河中所有沙有如是沙等恆河是諸恆河所有沙數佛世界如是寧為多不甚多世尊佛告須菩提爾所國土中所有衆生若干種心如來悉知何以故如來説諸心皆為非心是名為心所以者何須菩提過去心不可得現在心不可得未來心不可得二就所知諸心以明智淨凡五段從狹至廣展轉而數謂數沙數河數界數生數心今先約一箇恆河以數沙次約一恆河中沙以數河三約沙河中沙以數界四約爾所界中所有生五約一一衆生所有心何以故者徵悉知所以非心者妄識本空是名心者真心不滅也又徵者釋非心所以謂三際求心不可得故云非心三際者過去已滅現在不住未來未至古德偈云三際求心心不有心不有處妄元無妄元無處即菩提生死涅槃本平等第十六疑即躡上章而來謂福德依心而成諸心既倒妄不可得則福德亦是倒妄何名善法既非善法修福何益耶須菩提於意云何若人滿三千大千世界七寶以用布施是人以是因緣得福多不如是世尊此人以是因緣得福甚多須菩提若福德有實如來不説得福德多以福德無故如來説得福德多此斷福德例心顛倒疑也福德多者以是離相行施福成無漏離於二障故得福德多佛為反覆以明之曰若使認福德有實則是取相之福如來則不説其得福德多何者以是有漏之福僅為人天小果不趣菩提故也若達福德無性以佛智慧為本是離相福則如來乃説得福德多耳故偈云佛智慧為本非顛倒功德問福性空故福多者前説妄心性空妄亦應多答福以佛智為本順於性空故悟性空福則甚多心識顛倒違於性空苟悟性空則心識都盡第十七疑從第三來向説一切賢聖皆以無為法而有差別無為者法身也法身無相云何諸佛必具足相好始名為佛乎須菩提於意云何佛可以具足色身見不不也世尊如來不應以具足色身見何以故如來説具足色身即非具足色身是名具足色身須菩提於意云何如來可以具足諸相見不不也世尊如來不應以具足諸相見何以故如來説諸相具足即非具足是名諸相具足此斷無為何有相好疑也法身固非相好而相好未始不是法身正由無相好能現相好如鏡中無物方能現物鏡若有物安能現物衆生皆具法身不能現相好者以其有物故也物即虗妄身心之執此義借須菩提發之有兩段初明無身現身次明無相現相初即隨形好次即三十二相論云法身畢竟非色身非諸相然相好二種亦非不佛此二不離法身故是故此二亦得言無故説非身亦得言有故説具足第十八疑云若如來色身相好不可得見云何言如來説法耶須菩提汝勿謂如來作是念我當有所説法莫作是念何以故若人言如來有所説法即為謗佛不能解我所説故須菩提説法者無法可説是名説法此斷無身何以説法疑也初遮錯解云莫作是念次徵釋所以謂如來達諸法空畢竟無執今言有説是謗佛執法不解如來所説之義也後示正見云無法可説是名説法譬鐘因人扣擊遂有響答鐘雖答響而無答響之念佛雖説法而無説法之心也問第三第五第七及此四處皆言無説豈不重耶答言各有旨未可雷同第三疑化身有説第五疑證智可説第七明佛無異説此文疑無身何説四處皆脈路深細應須甄別也爾時慧命須菩提白佛言世尊頗有衆生於未來世聞説是經生信心不佛言須菩提彼非衆生非不衆生何以故須菩提衆生衆生者如來説非衆生是名衆生記云諸疏於十八九之間約魏本經文皆出一疑秦經既無其文疏亦不敘其解今乃略敘而釋名為所説甚深無信疑須菩提解空第一與般若空慧相應故以慧命為稱白言頗有衆生於未來世聞説是法生信心不此疑甚深無信以問也蓋衆生有聖有凡而凡夫衆生於此般若不能生信聖體衆生乃能生信佛答意云實有衆生能信此法但彼能信者非是凡夫衆生非不是聖性衆生聖性衆生即大乘根器人也豈可視為凡夫衆生不能生信哉尚恐未悟又徵釋之以何義故説非衆生又名衆生耶衆生衆生者雙牒上是非二種衆生也如來説非衆生者非凡小異生也是名衆生者結成能信之人也此章六十二言唐大興善寺釋靈幽於長慶二年暴亡冥王問所作曰一生持金剛經王命坐朗誦地獄諸苦一時停息王曰經中尚少一章真本在濠州鐘離寺石上師算合終增壽十年歸勸世人持誦幽還魂具奏敕中使往濠視果然考之二論皆有釋文遂增入流通此段秦本雖無魏本則有況二論具釋又有冥報之緣宜可信也第十九疑從第三十二十三中來以彼文中皆言無法得菩提故論云如來不得一法云何如來離上上證轉轉得菩提耶須菩提白佛言世尊佛得阿耨多羅三藐三菩提為無所得耶佛言如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得是名阿耨多羅三藐三菩提復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提以無我無人無衆生無壽者修一切善法則得阿耨多羅三藐三菩提須菩提所言善法者如來説即非善法是名善法此斷無法如何修證疑也空生問佛於菩提為有所得無所得答文有三段初以無法可得為正覺佛先印可其言曰如是如是我於菩提無有少法可得名得菩提二以平等為正覺無高下者謂在聖不增故無高居凡不滅故無下偈云法界不增減故三以正助修善成正覺謂雖平等非是不修得成正覺應以無我等修諸善法然後得成無我等是了因即正道也修一切善法是緣因即助道也阿耨菩提是正覺也所言善法者如來説非住相有漏之善法乃是離相無漏之善法耳問第三第十二第十三兼此一段前後四處皆説不得菩提云何區別答前後文雖相似義意不同第三疑釋迦得果第十二疑善慧成菩提因第十三疑無法無佛此十九疑有修有證四義條然無相濫也第二十疑云若修善法得菩提云何前來頻言持説能成菩提且所説之法不離於名句文是三皆無記性無記之法無有因果豈成菩提耶須菩提若三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施若人以此般若波羅蜜經乃至四句偈等受持讀誦為他人説於前福德百分不及一千萬億分乃至算數譬喻所不能及此斷所説無記非因疑也謂持説雖云無記而是菩提正因蓋經詮真理因之悟解依解起行方得菩提若無教門安知所入故法華云以佛教門出三界苦故舉須彌寶施不及一偈功德慈氏偈云雖言無記法而説是彼因是故一法寶勝無量珍寶彼即菩提也問此與第九疑何別答彼約有為無體難此約無記非因難又彼唯據持説難此兼對善法難迢然不同也第二十一疑云既言是法平等無有高下云何如來度衆生耶須菩提於意云何汝等勿謂如來作是念我當度衆生須菩提莫作是念何以故實無有衆生如來度者若有衆生如來度者如來則有我人衆生壽者須菩提如來説有我者即非有我而凡夫之人以為有我須菩提凡夫者如來説即非凡夫是名凡夫此斷平等云何度生疑也初遮錯解曰汝勿謂如來度衆生切莫作是念也次示其正見曰以何義故謂實無衆生得滅度者蓋平等真法界佛不度衆生以名共彼陰不離於法界論云衆生假名與五陰實法皆不離法界故無衆生得滅度者三反釋其所以曰若如來有如是心五陰中有衆生可度則有我人等相又展轉拂迹曰佛雖説我元來無我執我者蓋是凡夫雖言凡夫亦無凡夫譬之夢中見虎虎與夢人皆不可得然凡夫執我故云非我恐執凡夫故云非凡夫邐迤除遣執情故云展轉拂迹然前後四處皆説度生無度文雖同而意異最初令離我度生十一疑能度者是我十四疑無我而誰度此二十一疑真界平等不合度生同異昭然應須甄別第二十二疑從十七中來以前言即非具足色身即非諸相具足又云是名具足色身是名諸相具足意云法身畢竟非相好而相好未嘗不佛由無身故現身無相故現相法身為根相好為苗便可因苗識根即色相可以比知無相耳佛以法身是真智境非識所能比知也須菩提於意云何可以三十二相觀如來不須菩提言如是如是以三十二相觀如來佛言須菩提若以三十二相觀如來者轉輪聖王則是如來須菩提白佛言世尊如我解佛所説義不應以三十二相觀如來爾時世尊而説偈言若以色見我以音聲求我是人行邪道不能見如來此斷以相比知真佛疑也凡五段初佛審云還可以三十二相比觀法身如來不次答意云因苗知根實可以相比觀法身以法身既流出相好即由此相好知如來證得無相法身三世尊乃以凡聖不分難之曰如來若可以相好比觀者輪王亦有此相好輪王應是如來蓋約本望末則定約末望本則不定若不究法身之本而但以三十二相之末比觀如來者且如來三十二相依法身而現輪王依業因而生凡聖雲泥復何準的四空生即悟佛非相見五世尊復曉以非見聞所及偈意謂若人不究法身之本而但以三十二相見或以説法音聲求但見所見聞所聞是凡小偏邪之道不能見正覺如來何者法身非識境離一切相乃真智境唯證方知魏譯經文加後偈云彼如來妙體即法身諸佛法身不可見彼識不能知餘譯亦多加者論云此説何義故慈氏頌云唯見色聞聲是人不知佛以真如法身非是識境界前二句釋秦偈後二句釋魏偈也按第一第七第十七及此一段皆云不以相見如來義意皆別初以對果疑因次明感果離相十七明依真現假此明約假求真故不同也第二十三疑從上不應以相觀佛而來承上色見聲求是邪法身不可以相比知遂疑佛果一向無相無為修福德之因但成相果相果既非佛果是則佛果非關福相也須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提汝若作是念發阿耨多羅三藐三菩提心者説諸法斷滅莫作是念何以故發阿耨多羅三藐三菩提心者於法不説斷滅相須菩提若菩薩以滿恆河沙等世界七寶布施若復有人知一切法無我得成於忍此菩薩勝前菩薩所得福德何以故須菩提以諸菩薩不受福德故須菩提白佛言世尊云何菩薩不受福德須菩提菩薩所作福德不應貪著是故説不受福德此斷佛果非關福相疑也文四初遮毀相之念華嚴經云色身非是佛音聲亦復然亦不離色聲見佛神通力若言如來不具足相是斷滅見故佛止云莫作是念二出毀相之過謂毀相則墮斷滅是損減謗三明福相不失具足相即福德相也蓋大乘所修五度之因所得福德之果但離取著之相不同小乘斷滅之見故曰於法不説斷滅相論云此中為遮一向寂靜故顯示不住涅槃四明不失所以又二先明得忍故不失忍即無生法忍初住菩薩所證得無我忍功德勝恆沙寶施功德無我者無二種我也次明不受故不失無著云此顯示不著生死故若住生死即受福德又徵釋云何以不受福德以無貪著故貪著即因成有漏縱得三十二相但同輪王不生貪著則因成無漏所得三十二相莊嚴法身名之為佛第二十四疑從上不受福德而來若諸菩薩不受福德云何諸佛福德與衆生受用據佛壽量合滿百年至八十便入涅槃意留二十年福與後代弟子受用又若供養承事於佛者能令獲福無量斯亦佛福衆生得受用也須菩提若有人言如來若來若去若坐若臥是人不解我所説義何以故如來者無所從來亦無所去故名如來此斷化身出現受福疑也文二初斥錯解謂若人言如來出現來入滅去等皆不解佛所説義次示正見云無所從來亦無所去故名如來也偈云去來化身佛如來常不動大雲云衆生心水清淨則見佛來來無所從濁見雙林示滅則云佛去去無可至是以華嚴經云如來不出世亦無有涅槃但以方便力示現自在法若然尚無出現之佛安有受福之事但化身應機見有出沒耳第二十五疑據前不可以化相比知法身法身無去來坐臥即似真化異據遮斷滅之念又顯不失福相即似真化一故成此疑也佛約微塵世界委釋非一異義以斷此疑須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵衆寧為多不甚多世尊何以故若是微塵衆實有者佛則不説是微塵衆所以者何佛説微塵衆則非微塵衆是名微塵衆世尊如來所説三千大千世界即非世界是名世界何以故若世界實有者則是一合相如來説一合相則非一合相是名一合相須菩提一合相者即是不可説但凡夫之人貪著其事此斷法身化身一異疑也文二初約塵界破一異二約止觀破我法今初又三初標界塵一異以顯無性言世界者喻法身也微塵者喻應身也碎界為塵塵無異性合塵為界界無一性喻全法起應應無異性全應即法法無一性然如來體用互融所以能一能異非一非異自在無礙者矣此依天親約斷疑釋之而無著約破執釋云為破名色身故言界塵等於中二種方便一細末方便二無所見方便無所見者即不念也空生答云甚多者是細末方便破粗色也二釋微塵喻應身無異性以何義故説微塵耶以無實體故又徵云所以説微塵空又説為微塵者何謂也釋意云佛所説者非實微塵是空微塵也塵碎為末故非一塵衆聚故故非異所以偈云於是法界處非一亦非異無著云此約不念方便破微塵也三釋世界喻法身無一性謂非唯所起微塵空抑亦能起世界是空無著云此以不念方便破世界此破名身乃有情世間也以心法無質不可分析但以不念方便破之謂念之即有不念即無故起信云心生法生心滅法滅是也又俱約塵界破和合徵云何以説世界空耶釋云若世界實有者則是衆塵冥一不可分之和合相矣則不應有多今如來説三千明非冥然一矣此約三千破一界也一合非一合者釋意云佛説一合非實有之一合是空無之一合也此一合相無體可説但為凡夫妄生貪著迷於事法而起煩惱矣須菩提若人言佛説我見人見衆生見壽者見須菩提於意云何是人解我所説義不不也世尊是人不解如來所説義何以故世尊説我見人見衆生見壽者見則非我見人見衆生見壽者見是名我見人見衆生見壽者見須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相須菩提所言法相者如來説即非法相是名法相此約止觀破我法也破我法者必得根本無分別智而我法之見始除欲得根本智先修加行智為方便止觀定慧等持觀人法二無我不起分別至於親證真如是為得根本智忘緣入理此修行要門也先破我執謂若言佛説我見等以為實有者是人不解如來所説之義何以不解意謂佛説我人等見非實我人等見是假名我人等見衆生不解謂之為實如蠅處見蛇豈是實見次破法執謂不但我見非有且法相亦空發無上菩提心者當進觀法空是以日用之中於一切法皆應以增上心增上智為方便何等一切法十法界中若聖若凡若依若正下自衆生五蘊上至諸佛相好如是依奢摩他屏息萬緣唯心獨存靈靈不昧而知知一切法無我如是依毗婆舍那觀察一切委細推求歷歷分明而見見諸相非相如是依禪那定慧等持無礙自在雖未能親證真如已為無分別根本正智近方便內變真如而為信解信心清淨即生實相此當地前四加行位從是能引根本正智離能所取不生能所我人法相證入初地乃至佛地雖分滿不固皆用根本無分別智親證真如歸無所得何則所言法相者凡夫不了以之為實在如來説即非實有之法相但是假名之法相況約勝義而論純一真如彌滿清淨中不容他誰為能所我人之法相誠能如是觀察我即非我法即非法離名離相證入真如三昧始信十方諸佛平等清淨真即非真化即非化又何一異之有此約止觀定慧破我法以斷一異之疑也第二十六疑云化身法身誠非一異而化身示現終無自體其所説法豈有實耶縱使持説當有何福須菩提若有人以滿無量阿僧祗世界七寶持用布施若有善男子善女人發菩薩心者持於此經乃至四句偈等受持讀誦為人演説其福勝彼云何為人演説不取於相如如不動此斷化身説法無福疑也文二先明説法功德論云雖諸佛化身作用化身説法有無量無盡無漏功德云何為人演説下二明説法不染謂若能不以生滅心行説實相法則如彼真如故曰如如又心如境如故曰如如不動者正明無染義無著云為説法不染故有如是大利益第二十七疑云若是則化身如來常為衆生説法云何言如來無去來坐臥常入涅槃耶涅槃寂靜説法喧動動靜相反云何兩存釋意云佛有妙智觀諸法空如夢幻等雖現説法似有為相而常住涅槃無作之理復何疑哉何以故一切有為法如夢幻泡影如露亦如電應作如是觀此斷入寂如何説法疑也徵云何故説法不礙涅槃耶以如來有妙智觀一切有為之法皆非實有如夢幻等共有六喻一夢喻人於日用見聞所熏夜寐則宛然而現悲歡萬狀咸謂為真不知是獨頭意識所變全無實體而好歹境界夢時非無及至於醒了無所有人生於世亦復如是以無始時來熏習而住故招感現在果報不爽雖蝴蝶莊周變化已極然豈悟後始空方在神遊早無實際不待覺而後知也二幻喻世有幻師作幻術呪巾可以為兔草可以為馬或作城郭男女種種幻態昧者惑焉幻呪一止寂然無有三泡喻水本靜也因風激動而泡生焉其體本虗即之安在四影喻鏡中日中隨形現像妍醜無遁行止有待捉之不可無體可得惟息陰悟本庶不為其所惑不然終在燈影子下行耳此四喻喻一切法空無有實凡夫皆執身世為常不悟無常故佛又説露喻薤上露何易晞人之住世少時耳須臾變滅焉得久停六電喻露猶少停電則不能以一瞬即生即滅曾不異時凡有為之法皆爾剎那變滅人不自覺佛以妙智觀空故雖現説法似有為相而常住涅槃無作之理所謂寂寥於萬化之域動用於一虗之中何喧寂之有所以云夢幻泡影空理全彰露電二喻無常足顯悟真空則不住諸相觀生滅則警䇿修行妙符破相之宗巧示亡情之觀了此六喻則全經之旨思過半矣學者宜盡心焉正宗分竟三流通分佛説是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅等聞佛所説皆大歡喜信受奉行上來宗趣既陳務於利濟近益當時之會遠被未來之機使般若慧命傳芳無壅故曰流通然般若宗趣歸極於無住處涅槃而以發菩提心為始菩提心者本源自性清淨心也心住於法即不清淨所以四相不住六塵不住聲聞自果不住菩薩莊嚴佛土不住乃至如來三十二相不住説法不住涅槃不住應住者極證於無住處涅槃矣前正宗分中空生有問佛則有答空生有疑佛則有決至此慧日當空羣疑氷釋善吉無問能仁杜宣長老須菩提及諸四部弟子出家而為除饉士除饉女者在家而為清信男清信女者乃至一切世間三世間也若天梵王帝釋等若人國王大臣長者居士等若阿修羅八部護法等俱在法會中聞佛所説般若之法皆各歡喜奉行古德云般若深經三世佛母聞經四句已超惡趣之因一念淨持必獲菩提之果是故欲圓無上菩提道當學般若波羅蜜
