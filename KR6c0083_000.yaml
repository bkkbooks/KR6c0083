body:
  text: 序原夫般若功德不可思議者由其照破世出世間諸相洞見性源故也衆生隨順無明長居此岸流轉生死菩薩隨順般若立登彼岸高證涅槃蓋般若者度苦海之慈航破長夜之明炬諸佛所師諸天敬奉可不信哉世尊二十年中為諸弟子搜窮二我直徹三空微細淘汰廣談般若大般若經凡四處一十六會六百卷金剛般若當第二處第九會第五百七十七卷傳至此土凡六譯時所宗尚皆弘秦本天竺有無著菩薩位登初地因讀此經罔測涯涘乃入日光定上升兜率親從慈氏稟受八十行偈以釋此經又將此偈轉授弟天親菩薩各造論解釋天親約斷疑執以釋無著約顯行位以釋唐圭峯宗密禪師撮二論之精要科經唯約天親釋義即兼無著亦傍求餘論採集諸疏題云疏論纂要有宋長水法師子璿又作刊定記七卷釋之此金剛般若經真源的派列聖相傳遡流及源長水宗圭峯圭峯宗二論二論宗兜率兜率親稟靈山言言有據字字無差如取家券而治祖業復何疑哉後學安於寡聞此古疏記有畢生未曾寓目者甚至恣己臆見輒形注釋毫釐之差天地懸隔疑誤將來其害匪細寒輝闍黎禪晏之暇以是經為印心之明鏡涵泳古疏記有年但其文簡古不便初學乃刪繁取要又從而敷演挑剔之名之曰演古俾讀者開卷瞭然發四心而興萬行破羣疑而徹三空其有功於學般若者甚大故樂為序諸卷首時歲在丙辰正月燈節後三日富沙釋道霈題敘金剛經雖白衣士有能誦之即注解亦夥矣若論般若大旨無論誦者茫然即注者亦未必盡得也夷考無著菩薩位證初地讀此經罔測其義至升兜率稟彌勒指授復轉示天親始各造論解釋而唐之圭峰宋之長水乃循流溯源互有宣發然皆辭旨精妙非宿學難知則金剛般若豈易言哉博地凡夫以愚癡柔暗浮沉苦海非般若不能津渡然非自發菩提心焉能直契般若特人之不肯耳且般若慧光照破萬有洞徹性源不但盡掃凡情抑且不存聖解故金剛般若以無住為宗以摧壞一切為用誦者説者不悟妙旨徒爾尋言恐去經愈遠矣余幼依上士聞誦金剛而喜之茲劇病更生知生滅不常用深警策方期一意法寶窺測甚深適寒輝禪師以金剛演古示余演古者即二論以及纂要刊定諸書演暢宣明發古人未盡之祕以成詮釋也其中緒清意簡理玄辭達才一展玩意念氷融顧著書者皆自成一家言而禪師獨曰演古正以禪師注經不更自立意解以注還古人是注法不立也則知從上聖賢論疏即論疏法亦不立也繇是而解如來廣説般若即般若法亦不立也就演古而約經義其有裨于發四心證三空破羣疑嚴萬行功德豈淺鮮哉是書所在皆應作禮圍繞以諸華香而散其處會稽如現范鋐和南撰後序金剛般若經者乃佛祖傳心之祕要也以著衣持鉢為發起者欲令知般若不離日用之間也雖其中破相斷疑而事行理觀未嘗偏廢其度生無度無住生心以無我等修一切善法非莊嚴名莊嚴等類皆正偏回互不犯鋒芒神而明之存乎其人故黃梅以是印心曾溪聞而開悟豈徒然哉但此經義趣深遠古今詮釋殆且百家惟西竺天親無著稟承兜率以住一十八處密示階差斷二十七疑潛通血脈允合世尊無相大乘之旨而此土則有青龍大雲資聖塵外諸疏或依或違學者無所折衷中唐圭峰宗密禪師約無著七種義句以懸判依天親斷疑問答以科釋并採集諸疏題曰疏論纂要又為紀略以釋上符聖旨俯逗羣機實像代之法匠也五季石壁法師襲用紀略別為廣録辭或繁長學者苦之有宋天聖間長水子璿法師重為修治剪煩削冗黜偽存真命名刊定記真可謂內院之功臣圭山之後裔也斯文不墜厥功懋哉余以己酉之夏叨陪清衆於石鼓選佛場因同諸友商榷大意山居晝永時或披尋但纂要文簡古而難通刊定語詳悉而莫記因會合兩部刪煩取要而融通之其間敷演挑剔不悖古德之意竊命名曰演古聊以自備遺忘朝夕玩繹其發四心而修六度破二我而徹三空端有藉是為指南云時己酉秋九月既望後學寂𦦨書於石鼓選佛場
